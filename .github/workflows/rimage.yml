name: rimage

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".gitignore"
      - "**.md"
      - "LICENSE**"
  pull_request:
    paths-ignore:
      - ".github/**"
      - ".gitignore"
      - "**.md"
      - "LICENSE**"
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  test:
    name: test

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          # Disable build on wasm32 because couldn't fix currently
          #- wasm32-unknown-emscripten

        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            target-apt-arch: amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            target-apt-arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            target-apt-arch: arm64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            target-apt-arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: i686-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          #- target: wasm32-unknown-emscripten
          #  os: macos-14

    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: set up ubuntu multiarch
        if: startsWith(matrix.os, 'ubuntu') && matrix.target-apt-arch != 'amd64'
        run: |
          readonly DISTRO_CODENAME=$(lsb_release -cs)
          readonly HOST_ARCH=$(dpkg-architecture -q DEB_HOST_ARCH)
          readonly TARGET_ARCH="${{ matrix.target-apt-arch }}"
          sudo dpkg --add-architecture "$TARGET_ARCH"
          # Clear all existing sources to prevent architecture-leak 404s
          # (e.g. security.ubuntu.com doesn't serve arm64, ports.ubuntu.com doesn't serve amd64)
          sudo rm -f /etc/apt/sources.list /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          # Host arch: use Azure-local mirror for reliability on GH runners
          sudo tee /etc/apt/sources.list <<EOF
          deb [arch=$HOST_ARCH] http://azure.archive.ubuntu.com/ubuntu/ $DISTRO_CODENAME main restricted universe multiverse
          deb [arch=$HOST_ARCH] http://azure.archive.ubuntu.com/ubuntu/ $DISTRO_CODENAME-updates main restricted universe multiverse
          deb [arch=$HOST_ARCH] http://azure.archive.ubuntu.com/ubuntu/ $DISTRO_CODENAME-backports main restricted universe multiverse
          deb [arch=$HOST_ARCH] http://security.ubuntu.com/ubuntu/ $DISTRO_CODENAME-security main restricted universe multiverse
          deb [arch=$TARGET_ARCH] http://ports.ubuntu.com/ubuntu-ports/ $DISTRO_CODENAME main universe multiverse
          deb [arch=$TARGET_ARCH] http://ports.ubuntu.com/ubuntu-ports/ $DISTRO_CODENAME-updates main universe multiverse
          deb [arch=$TARGET_ARCH] http://ports.ubuntu.com/ubuntu-ports/ $DISTRO_CODENAME-backports main universe multiverse
          deb [arch=$TARGET_ARCH] http://ports.ubuntu.com/ubuntu-ports/ $DISTRO_CODENAME-security main universe multiverse
          EOF

      - name: install musl development files
        if: endsWith(matrix.target, '-musl')
        run: |
          sudo apt-get -yq update
          sudo apt-get -yq install --fix-missing musl-tools musl-dev:${{ matrix.target-apt-arch }}

      - name: install qemu and aarch64 cross compiler
        if: startsWith(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get -yq update
          sudo apt-get -yq install --fix-missing qemu-user gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6:arm64

      - name: set musl-g++
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo ln -sf /bin/g++ /bin/musl-g++

      - name: set aarch64-linux-musl-g++
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo ln -sf /bin/aarch64-linux-gnu-g++ /bin/aarch64-linux-musl-g++

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          target: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: install dependencies (linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get -yq update
          sudo apt-get -yq install --fix-missing ninja-build
          sudo apt-get -yq install --fix-missing meson
          sudo apt-get -yq install --fix-missing nasm

      - name: install dependencies (macos)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew reinstall ninja
          brew reinstall meson
          # NASM 3.0+ dropped multipass (-Ox) from -hf output,
          # which breaks libaom's cmake detection. Pin to 2.16.03.
          # should be removed once libavif-rs updates.
          # REF: https://github.com/njaard/libavif-rs/issues/122
          brew uninstall -f nasm || true
          brew cleanup nasm || true
          rm -rf /opt/homebrew/bin/nasm /usr/local/bin/nasm /opt/homebrew/opt/nasm

          curl -fsSLo /tmp/nasm-macosx.zip https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip -o /tmp/nasm-macosx.zip -d /tmp
          sudo cp /tmp/nasm-2.16.03/nasm /usr/local/bin/nasm
          sudo chmod +x /usr/local/bin/nasm
          sudo mkdir -p /opt/homebrew/bin
          sudo cp /tmp/nasm-2.16.03/nasm /opt/homebrew/bin/nasm
          sudo chmod +x /opt/homebrew/bin/nasm

          echo "/usr/local/bin" >> $GITHUB_PATH
          echo "ASM_NASM=/opt/homebrew/bin/nasm" >> $GITHUB_ENV

          # Verify NASM is available
          /usr/local/bin/nasm -version
          /opt/homebrew/bin/nasm -version

      - name: install dependencies (windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          choco install -y ninja
          choco install -y meson
          choco install -y nasm

      - name: install emcc
        if: matrix.target == 'wasm32-unknown-emscripten'
        run: brew install emscripten

      - name: build
        if: matrix.target != 'wasm32-unknown-emscripten'
        run: cargo build -r --all-features

      - name: run tests
        if: matrix.target != 'wasm32-unknown-emscripten'
        run: |
          cargo nextest run --release --all-features
          cargo test --doc --release --all-features

      - name: check wasm
        if: matrix.target == 'wasm32-unknown-emscripten'
        run: |
          export EMSCRIPTEN_CMAKE_FILE="$(brew --cellar emscripten)/$(brew list --versions emscripten | tr ' ' '\n' | tail -1)/libexec/cmake/Modules/Platform/Emscripten.cmake"
          cargo check --all-features
        env:
          CC: "emcc"
          CXX: "emcc"

      - name: upload cli binary as artifact
        if: matrix.target != 'wasm32-unknown-emscripten'
        uses: actions/upload-artifact@v6
        with:
          name: rimage-${{ matrix.target }}
          path: |
            target/${{ env.CARGO_BUILD_TARGET }}/release/rimage
            target/${{ env.CARGO_BUILD_TARGET }}/release/rimage.exe
          if-no-files-found: error
          compression-level: 0

      - name: add summary
        if: success()
        shell: pwsh
        run: |
          $NeedZone1 = [Int16]2
          $NeedZone2 = [Int16]8
          $OutputFormat = "%Y-%m-%d_%H:%M:%S"
          $NowTime = [UInt32](Get-Date -UFormat "%s")
          $Zone = [Int16](Get-Date -UFormat "%Z").ToString()
          $NeedTime1 = ($NeedZone1 - $Zone) * 60 * 60
          $NeedTime2 = ($NeedZone2 - $Zone) * 60 * 60
          $Result1 = $NowTime + $NeedTime1
          $Result2 = $NowTime + $NeedTime2
          $Formated1 = (Get-Date -UnixTimeSeconds $Result1 -UFormat $OutputFormat).ToString()
          $Formated2 = (Get-Date -UnixTimeSeconds $Result2 -UFormat $OutputFormat).ToString()

          $summary = "
          Completion time :   $Formated1 (GMT+02:00)
          文件编译完成时间：  $Formated2 (GMT+08:00)
          "

          echo $summary >> $Env:GITHUB_STEP_SUMMARY

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: install dependencies
        run: |
          sudo apt-get -yq update
          sudo apt-get -yq install --fix-missing ninja-build
          sudo apt-get -yq install --fix-missing meson
          sudo apt-get -yq install --fix-missing nasm

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          components: rustfmt, clippy

      - name: formatting check
        run: cargo fmt --all -- --check

      - name: clippy check
        run: cargo clippy --all-features -- -D warnings
